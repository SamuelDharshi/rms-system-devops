# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ────────────────────────────────────────────────────────────
# Change username/password to match your local MySQL installation
spring.datasource.url=jdbc:mysql://localhost:3306/rms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# update = Hibernate creates/updates tables automatically on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.rms=DEBUG
logging.level.org.springframework.web=INFO
